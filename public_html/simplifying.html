<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Right Back — AplosCRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #0B3D6B;
            text-align: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 3rem 4rem;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .eyebrow {
            color: #FF8C00;
            font-size: 0.6875rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .gear {
            font-size: 4rem;
            display: inline-block;
            animation: spin 4s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            color: #0B3D6B;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        h1 em {
            color: #2ECC71;
            font-style: italic;
        }

        p {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.9375rem;
            color: #156BA5;
            line-height: 1.7;
            margin-bottom: 0;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: #2ECC71;
            border-radius: 999px;
            margin: 1.5rem auto;
        }

        .tagline {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 0.875rem;
            color: #D6EAF8;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="eyebrow">AplosCRM</div>
        <div class="gear">⚙️</div>
        <h1>We're <em>simplifying</em> things.</h1>
        <div class="divider"></div>
        <p>Our team is behind the scenes making everything a little more elegant and a lot more powerful. Check back soon — we promise it'll be worth it.</p>
    </div>

    <p class="tagline">Elegant by Design &middot; Powerful by Default</p>

</body>
</html>
